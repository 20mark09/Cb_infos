name: Scrape Gold Prices

on:
  # Run every 2 hours (adjust as needed — goldbullioneg updates several times/day)
  schedule:
    - cron: "0 */2 * * *"

  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit gold.json back to repo

    steps:
      # ── 1. Checkout the repo ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ──────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      # ── 4. Run the scraper ────────────────────────────────────
      - name: Scrape gold prices
        env:
          # Optional — only needed for AI fallback if direct scraping fails
          # Add this secret in: GitHub repo → Settings → Secrets → Actions
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scrape_gold.py

      # ── 5. Commit updated gold.json if anything changed ───────
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if gold.json actually changed
          if git diff --quiet gold.json; then
            echo "No price changes — nothing to commit."
          else
            git add gold.json
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update gold prices [$TIMESTAMP]"
            git push
            echo "✅ Pushed updated gold.json"
          fi
