name: Update Market Data

on:
  schedule:
    - cron: '0 */2 * * 1-5'   # every 2 hours on weekdays
    - cron: '0 6 * * *'        # every day at 6 AM UTC
  workflow_dispatch:            # manual trigger from Actions tab

jobs:

  update-exchange-rates:
    name: Scrape CBE Exchange Rates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape_exchange_rates.py

      - name: Commit updated file
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "auto: update exchange_rates.json"
          file_pattern: exchange_rates.json
          pull_before_commit: true
          push_options: '--force-with-lease'

  update-global-markets:
    name: Scrape Global Markets
    runs-on: ubuntu-latest
    needs: update-exchange-rates      # runs AFTER exchange rates to avoid push conflicts
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run scraper
        run: python scrape_global_markets.py

      - name: Commit updated file
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "auto: update global_markets.json"
          file_pattern: global_markets.json
          pull_before_commit: true
          push_options: '--force-with-lease'
