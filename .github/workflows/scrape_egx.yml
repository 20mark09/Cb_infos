name: Scrape EGX Stock Data

on:
  schedule:
    - cron: "0 14 * * 0-4"   # 2 PM UTC = 4 PM Cairo (after EGX closes at 3:30 PM)
    - cron: "30 9 * * 0-4"   # 9:30 AM UTC = 11:30 AM Cairo (midday snapshot)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Scrape EGX data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scrape_egx.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add egx.json
          if git diff --cached --quiet; then
            echo "ℹ️  No changes."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: EGX data [$TIMESTAMP]"
            git push
            echo "✅ Pushed updated egx.json"
          fi
